{% extends "authenticated-base.html" %}

{% block subpage_content %}

<div class="row mb-4">
    <div class="col">
        <h1>{{ user.username }}'s Profile</h1>
        <p class="text-muted">Set up your fitness information and update it anytime.</p>
    </div>
</div>

<div class="row">
    <div class="col-12 col-lg-8">
        <div class="card p-4">
            <form method="post" action="/profile">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Age</label>
                        <input type="number" name="age" class="form-control" value="{{ user.age or '' }}" min ="1" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select name="gender" class="form-select" required>
                            <option value="">Choose gender</option>
                            <option value="Male" {% if user.gender == "Male" %}selected{% endif %}>Male</option>
                            <option value="Female" {% if user.gender == "Female" %}selected{% endif %}>Female</option>
                            <option value="Other" {% if user.gender == "Other" %}selected{% endif %}>Other</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Height (cm)</label>
                        <input type="number" step="0.1" min="1" name="height" class="form-control" value="{{ user.height or '' }}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number" step="0.1" min="1" name="weight" class="form-control" value="{{ user.weight or '' }}" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Goal</label>
                        <input type="text" name="goal" class="form-control" value="{{ user.goal or '' }}" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Activity Level</label>
                        <select name="activity_level" class="form-select" required>
                            <option value="">What best fits your activity level</option>
                            <option value="Sedentary" {% if user.activity_level == "Sedentary" %}selected{% endif %}>Sedentary</option>
                            <option value="Lightly Active" {% if user.activity_level == "Lightly Active" %}selected{% endif %}>Lightly Active</option>
                            <option value="Moderately Active" {% if user.activity_level == "Moderately Active" %}selected{% endif %}>Moderately Active</option>
                            <option value="Very Active" {% if user.activity_level == "Very Active" %}selected{% endif %}>Very Active</option>
                        </select>
                    </div>
                     {% if bmi %}
                    <div class="row">
                        <div class="col s12">
                        <p><strong>Your BMI:</strong> {{ bmi }} ({{ category }})</p>
                        </div>
                    </div>
                    {% endif %}

                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-primary">Save Profile</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
