{% extends "authenticated-base.html" %}
{% block title %}Tracker{% endblock %}

{% block subpage_content %}

<div class="row mb-4">
    <div class="col">
        <h1>{{ user.username }}'s Tracker</h1>
    </div>
</div>

<div class="row">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="/tracker/add-info/{{ user.id }}">

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label for="age" class="form-label fw-semibold">Age</label>
                            <input id="age" name="age" type="number" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label for="gender" class="form-label fw-semibold">Gender</label>
                            <select id="gender" name="gender" class="form-select" required>
                                <option value="" disabled selected>Choose gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label for="height" class="form-label fw-semibold">Height (cm)</label>
                            <input id="height" name="height" type="number" step="0.1" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label for="weight" class="form-label fw-semibold">Weight (kg)</label>
                            <input id="weight" name="weight" type="number" step="0.1" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="goal" class="form-label fw-semibold">Goal</label>
                        <input id="goal" name="goal" type="text" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label for="activity_level" class="form-label fw-semibold">Activity Level</label>
                        <select id="activity_level" name="activity_level" class="form-select" required>
                            <option value="" disabled selected>What best fits your activity level</option>
                            <option value="not_really">Not Really (0–1 days a week)</option>
                            <option value="kinda_active">Kinda Active (2–3 days a week)</option>
                            <option value="active">Active (4–5 days a week)</option>
                            <option value="very_active">Very Active (6–7 days a week)</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-danger px-4">Save</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
