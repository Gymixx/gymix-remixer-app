{% extends "layout.html" %}
{% block title %}Tracker{% endblock %}
{% block page %} {{ current_user.username }}'s Tracker{% endblock %}

{% block link %}
<ul class="right">
    <li><a href="/tracker">Let's Track</a></li>
</ul>
{% endblock %}

{% block content %}
<main class="container" style="margin-top:100px">

  <form class="card col s12" method="POST" action="/tracker" style="padding:1em">

      <div class="row">
        <div class="input-field col s6">
          <input name="age" type="number" required>
          <label>Age</label>
        </div>

        <div class="input-field col s6">
          <select name="gender" required>
            <option value="" disabled selected>Choose gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
          <label>Gender</label>
        </div>
      </div>

      <div class="row">
        <div class="input-field col s6">
          <input name="height" type="number" step="0.1" required>
          <label>Height (cm)</label>
        </div>
        <div class="input-field col s6">
          <input name="weight" type="number" step="0.1" required>
          <label>Weight (kg)</label>
        </div>
      </div>

      <div class="row">
        <div class="input-field col s12">
          <input name="goal" type="text" required>
          <label>Goal</label>
        </div>
      </div>

      <div class="row">
        <div class="input-field col s12">
          <select name="activity_level" required>
            <option value="" disabled selected>What best fits your activity level</option>
            <option value="not_really">Not Really (0–1 days a week)</option>
            <option value="kinda_active">Kinda Active (2–3 days a week)</option>
            <option value="active">Active (4–5 days a week)</option>
            <option value="very_active">Very Active (6-7)</option>
          </select>
          <label>Activity Level</label>
        </div>
      </div>

      {% if bmi %}
      <div class="row">
        <div class="col s12">
          <p><strong>Your BMI:</strong> {{ bmi }} ({{ category }})</p>
        </div>
      </div>
      {% endif %}

      <div class="card-action row">
        <input type="submit" value="Save" class="red text-white btn right">
      </div>

  </form>

</main>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var elems = document.querySelectorAll('select');
  M.FormSelect.init(elems);
  M.updateTextFields();
});
</script>

{% endblock %}
